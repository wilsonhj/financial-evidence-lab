openapi: 3.1.0
info:
  title: Financial Evidence Lab API
  version: 0.4.0
  description: >-
    Frozen v1 contract surface (ADR-0001). This file seeds the M0 freeze:
    conventions (error envelope, idempotency, optimistic concurrency,
    run-ID pattern), identity/workspace resources, evidence reads, and
    ingestion jobs. v0.3.0 adds observable hybrid retrieval (ADR-0006).
    v0.4.0 adds bounded agentic extraction (ADR-0007): extraction runs,
    typed resumable SSE, proposals/review, approved versions, plus a
    compatible open-enum loosening for volatile M2 planner/lane/event
    labels. Modeling and forecasting paths arrive in later minors.
servers:
  - url: /
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /v1/workspaces:
    post:
      operationId: createWorkspace
      summary: Create a workspace
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceCreate"
      responses:
        "201":
          description: Workspace created.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: listWorkspaces
      summary: List workspaces visible to the caller
      responses:
        "200":
          description: Workspaces.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      operationId: getWorkspace
      summary: Fetch a workspace
      responses:
        "200":
          description: The workspace.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateWorkspace
      summary: Update a workspace (optimistic concurrency)
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceUpdate"
      responses:
        "200":
          description: Updated workspace.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "412":
          description: ETag precondition failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/entities:
    get:
      operationId: searchEntities
      summary: Search issuers/entities
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Matching entities.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entity"
        default:
          $ref: "#/components/responses/Error"
  /v1/entities/{entityId}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      operationId: getEntity
      summary: Fetch an entity
      responses:
        "200":
          description: The entity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        default:
          $ref: "#/components/responses/Error"
  /v1/entities/{entityId}/documents:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      operationId: listEntityDocuments
      summary: List an entity's documents (point-in-time filtered)
      parameters:
        - name: as_of
          in: query
          required: false
          description: >-
            Cutoff timestamp; only documents publicly available at or before
            this instant are returned. Enforced server-side.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Documents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentMeta"
        default:
          $ref: "#/components/responses/Error"
  /v1/documents/{documentId}:
    parameters:
      - name: documentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getDocument
      summary: Fetch document metadata
      responses:
        "200":
          description: Document metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentMeta"
        default:
          $ref: "#/components/responses/Error"
  /v1/documents/{documentId}/reader:
    parameters:
      - name: documentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getDocumentReader
      summary: Composite version-pinned evidence reader (ADR-0005)
      description: >-
        Returns the target document plus same-entity sibling evidence in one
        snapshot-consistent, cutoff-enforced response. Exactly one parsed
        document_version_id is selected per returned document: the version
        pinned by corpus_version_id when given, otherwise the latest parsed
        version under the ADR-0005 total order (created_at DESC, then
        bytewise parser_version DESC, normalizer_version DESC, id DESC).
        A cutoff-hidden target returns the same 404 as a missing target.
        Authentication and org membership are mandatory; 401/403/409/422/5xx
        keep the typed error envelope and are never converted to 404.
      security:
        - bearerAuth: []
      parameters:
        - name: as_of
          in: query
          required: false
          description: >-
            Inclusive cutoff (published_at <= as_of), enforced server-side
            on the target document and all nested evidence. Must carry an
            explicit UTC offset. Defaults to the request time; the response
            echoes the effective value actually enforced.
          schema:
            type: string
            format: date-time
        - name: corpus_version_id
          in: query
          required: false
          description: >-
            Pin evidence to a published (active or superseded) corpus
            version. Unknown or draft corpus versions return 404 with
            details.resource = "corpus_version".
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Composite reader evidence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReaderResponse"
        "404":
          description: >-
            Target document missing, hidden by the cutoff (identical
            envelope in both cases), unreadable under the corpus pin, or
            unknown/draft corpus version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/source-spans/{sourceSpanId}:
    parameters:
      - name: sourceSpanId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getSourceSpan
      summary: Fetch a stable source span
      responses:
        "200":
          description: The source span.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceSpan"
        default:
          $ref: "#/components/responses/Error"
  /v1/ingestion/jobs:
    post:
      operationId: createIngestionJob
      summary: Enqueue an ingestion job (long-running; returns a run ID)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestionJobCreate"
      responses:
        "202":
          description: Job accepted; poll the job resource.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /v1/ingestion/jobs/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getIngestionJob
      summary: Fetch job state
      responses:
        "200":
          description: The job envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/queries:
    post:
      operationId: createQuery
      summary: Create an immutable query and retrieval run
      description: >-
        Captures an immutable query plan pinned to corpus/index versions.
        Optional index_version_id pins a ready/superseded published index;
        omit to capture the workspace active default at creation. Requested
        as_of may narrow but never widen the workspace cutoff. Replay of a
        stored trace is a read of events/trace and creates no row; use
        POST .../reruns for an unchanged child run, or a new query with
        parent_query_id when controls change.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuery"
      responses:
        "202":
          description: Query and run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryAccepted"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/queries/{queryId}:
    parameters:
      - $ref: "#/components/parameters/QueryId"
    get:
      operationId: getQuery
      summary: Fetch an immutable query snapshot and its run history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Query snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuerySnapshot"
        "404":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/queries/{queryId}/reruns:
    post:
      operationId: createQueryRerun
      summary: Create a child run pinned to the original query inputs
      description: >-
        Unchanged rerun: creates a child retrieval_run with parent_run_id,
        pinned to the original immutable plan/index/model inputs. Does not
        mutate the parent query. Distinct from stored-trace replay (GET
        events/trace), which creates no data.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Child run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryAccepted"
        default:
          $ref: "#/components/responses/Error"
  /v1/retrieval-runs/{runId}:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      operationId: getRetrievalRun
      summary: Read the immutable trace snapshot
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Retrieval trace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalTrace"
        default:
          $ref: "#/components/responses/Error"
  /v1/retrieval-runs/{runId}/events:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      operationId: streamRetrievalRunEvents
      summary: Stream one run's persisted events; Last-Event-ID resumes
      description: >-
        text/event-stream. Each SSE `data:` payload is JSON RetrievalEvent
        (schema_version retrieval-event/v1). Events are committed before
        emission. Heartbeat every 15–30s. Last-Event-ID resumes after that
        sequence (decimal seq).
      security:
        - bearerAuth: []
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: >-
            text/event-stream of RetrievalEvent JSON payloads.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/RetrievalEvent"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/retrieval-runs/{runId}/feedback:
    parameters:
      - $ref: "#/components/parameters/RunId"
    post:
      operationId: createRetrievalFeedback
      summary: Record append-only evidence feedback for a run
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceFeedback"
      responses:
        "201":
          description: Feedback recorded.
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/extraction-runs:
    post:
      operationId: createExtractionRun
      summary: Create a bounded extraction run
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRunCreate"
      responses:
        "202":
          description: Extraction run accepted.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: listExtractionRuns
      summary: List extraction runs for a workspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Extraction runs.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExtractionRun"
                  next_cursor:
                    type: ["string", "null"]
        default:
          $ref: "#/components/responses/Error"
  /v1/extraction-runs/{runId}:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      operationId: getExtractionRun
      summary: Read one extraction run
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Extraction run.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: cancelExtractionRun
      summary: Cancel an extraction run
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Cancel requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/Error"
  /v1/extraction-runs/{runId}/events:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      operationId: streamExtractionRunEvents
      summary: Stream one run's persisted events; Last-Event-ID resumes
      description: >-
        text/event-stream. Each SSE `data:` payload is JSON ExtractionEvent
        (schema_version extraction-event/v1). Events are committed before
        emission. Heartbeat every 15–30s. Last-Event-ID resumes after that
        identity id.
      security:
        - bearerAuth: []
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: >-
            text/event-stream of ExtractionEvent JSON payloads.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ExtractionEvent"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/extraction-runs/{runId}/rerun:
    post:
      operationId: rerunExtraction
      summary: Create a child extraction run from a parent
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
      responses:
        "202":
          description: Child run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/extractions:
    get:
      operationId: listExtractions
      summary: List extraction proposals for a workspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/Cursor"
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/ProposalState"
      responses:
        "200":
          description: Extraction proposals.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExtractionProposal"
                  next_cursor:
                    type: ["string", "null"]
        default:
          $ref: "#/components/responses/Error"
  /v1/extractions/{extractionId}:
    parameters:
      - $ref: "#/components/parameters/ExtractionId"
    get:
      operationId: getExtraction
      summary: Read one extraction proposal
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Extraction proposal.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionProposal"
        default:
          $ref: "#/components/responses/Error"
  /v1/extractions/review:
    post:
      operationId: reviewExtractions
      summary: Apply an atomic review command
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCommand"
      responses:
        "200":
          description: Atomic review result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResult"
        default:
          $ref: "#/components/responses/Error"
  /v1/approved-extractions/{recordId}:
    get:
      operationId: getApprovedExtraction
      summary: Read the current approved extraction version
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current approved version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovedExtraction"
        default:
          $ref: "#/components/responses/Error"
  /v1/approved-extractions/{recordId}/versions:
    get:
      operationId: listApprovedExtractionVersions
      summary: List immutable approved extraction versions
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Immutable history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovedExtraction"
        default:
          $ref: "#/components/responses/Error"
  /v1/approved-extractions/{recordId}/corrections:
    post:
      operationId: correctApprovedExtraction
      summary: Append an immutable corrected approved version
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectionCommand"
      responses:
        "201":
          description: Immutable child version.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovedExtraction"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Authenticated tenant context (ADR-0004 read path); org membership
        is enforced server-side on every corpus read.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Client-chosen key; retries with the same key return the original
        result and never duplicate work.
      schema:
        type: string
        minLength: 8
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: ETag of the version being updated.
      schema:
        type: string
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EntityId:
      name: entityId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QueryId:
      name: queryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExtractionId:
      name: extractionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
  headers:
    ETag:
      description: Version tag for optimistic concurrency.
      schema:
        type: string
  responses:
    Error:
      description: Error envelope (all non-2xx responses use this shape).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Health:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        version:
          type: string
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              description: Stable machine-readable code, e.g. TEMPORAL_SCOPE_VIOLATION.
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
    TenantContext:
      type: object
      description: Authenticated caller context; RLS policies key off org_id.
      required: [org_id, user_id, role]
      properties:
        org_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, editor, reviewer, viewer]
    WorkspaceCreate:
      type: object
      required: [name, entity_id, base_currency, fiscal_calendar, as_of]
      properties:
        name:
          type: string
          minLength: 1
        entity_id:
          type: string
          format: uuid
        base_currency:
          type: string
          description: ISO 4217 code.
          pattern: "^[A-Z]{3}$"
        fiscal_calendar:
          type: string
          description: Fiscal calendar identifier (e.g. FY-JAN31).
        as_of:
          type: string
          format: date-time
          description: Point-in-time cutoff; queries may not see evidence published after this instant.
    WorkspaceUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
        as_of:
          type: string
          format: date-time
        active_scenario_id:
          type: string
          format: uuid
    Workspace:
      allOf:
        - $ref: "#/components/schemas/WorkspaceCreate"
        - type: object
          required: [id, org_id, version, created_at]
          properties:
            id:
              type: string
              format: uuid
            org_id:
              type: string
              format: uuid
            active_scenario_id:
              type: string
              format: uuid
            version:
              type: integer
              minimum: 1
            created_at:
              type: string
              format: date-time
    Entity:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ticker:
          type: string
        cik:
          type: string
          pattern: "^[0-9]{10}$"
        lei:
          type: string
        parent_id:
          type: string
          format: uuid
    DocumentMeta:
      type: object
      description: Immutable source metadata with the spec 10.3 temporal fields.
      required: [id, entity_id, accession, source_url, content_hash, published_at, ingested_at]
      properties:
        id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
        form:
          type: string
        accession:
          type: string
        source_url:
          type: string
          format: uri
        content_hash:
          type: string
          description: sha256 of raw bytes, prefixed "sha256:".
          pattern: "^sha256:[0-9a-f]{64}$"
        published_at:
          type: string
          format: date-time
        filed_at:
          type: string
          format: date-time
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        ingested_at:
          type: string
          format: date-time
        valid_from:
          type: string
          format: date-time
        valid_to:
          type: string
          format: date-time
    SourceSpan:
      type: object
      required: [document_version_id, section_id, start_char, end_char, text_hash]
      properties:
        document_version_id:
          type: string
          format: uuid
        section_id:
          type: string
          format: uuid
        page:
          type: integer
          minimum: 1
        start_char:
          type: integer
          minimum: 0
        end_char:
          type: integer
          minimum: 0
        text_hash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
    IngestionJobCreate:
      type: object
      required: [kind, payload]
      properties:
        kind:
          type: string
          description: Job kind, e.g. sec_submissions_sync.
        payload:
          type: object
          additionalProperties: true
        queue:
          type: string
          default: default
        priority:
          type: integer
          minimum: 0
          maximum: 9
          default: 5
    JobEnvelope:
      type: object
      description: >-
        Durable job contract (PostgreSQL SKIP LOCKED queue). Terminal states
        are exactly succeeded, failed, cancelled.
      required: [id, kind, queue, priority, status, attempts, max_attempts, created_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
        queue:
          type: string
        priority:
          type: integer
        status:
          type: string
          enum: [queued, claimed, running, succeeded, failed, cancelled]
        attempts:
          type: integer
          minimum: 0
        max_attempts:
          type: integer
          minimum: 1
        idempotency_key:
          type: string
        heartbeat_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        error:
          $ref: "#/components/schemas/Error"
    FinancialFact:
      # Single source of truth: the frozen financial-fact/v1 JSON Schema.
      # The file $ref (not a copy) makes drift between the OpenAPI surface
      # and the canonical schema impossible (ADR-0005 section 6).
      $ref: "../schemas/financial-fact.schema.json"
    ReaderSelectionPolicy:
      type: string
      description: >-
        How the document_version_id of every returned document was chosen
        (ADR-0005 section 3). Consumers must tolerate unknown values.
      enum: [corpus_pinned, latest_parsed]
      x-fel-open-enum: true
    ReaderSection:
      type: object
      description: >-
        Filing section of the selected parsed version. start_char/end_char
        are canonical document-global offsets into the immutable canonical
        text; content is exactly canonical_text[start_char:end_char], so a
        span's section-local offset is span.start_char - section.start_char
        (ADR-0005 section 4).
      required:
        [id, document_version_id, heading, heading_path, ord, start_char, end_char, content]
      properties:
        id:
          type: string
          format: uuid
        document_version_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        heading:
          type: string
        heading_path:
          type: array
          items:
            type: string
        ord:
          type: integer
          minimum: 0
        start_char:
          type: integer
          minimum: 0
        end_char:
          type: integer
          minimum: 0
        content:
          type: string
    ReaderSpanRecord:
      type: object
      description: >-
        A stable source span keyed by its server-side id. The span payload
        is the frozen source-span/v1 shape with canonical document-global
        offsets; persisted provenance is never rewritten.
      required: [id, span]
      properties:
        id:
          type: string
          format: uuid
        span:
          $ref: "#/components/schemas/SourceSpan"
    ReaderFactRecord:
      type: object
      description: >-
        A normalized fact keyed by its server-side id, belonging to exactly
        the enclosing document block's selected document_version_id. Its
        fact.source_span_id resolves to a ReaderSpanRecord id in the same
        block. duplicate_of / restates expose the ingestion-computed
        duplicate and restatement linkage for sibling comparison.
      required: [id, document_version_id, fact]
      properties:
        id:
          type: string
          format: uuid
        document_version_id:
          type: string
          format: uuid
        duplicate_of:
          type: string
          format: uuid
        restates:
          type: string
          format: uuid
        fact:
          $ref: "#/components/schemas/FinancialFact"
    ReaderDocument:
      type: object
      description: >-
        The target document: metadata, the one selected parsed version, and
        that version's sections, spans, and facts.
      required: [meta, document_version_id, sections, spans, facts]
      properties:
        meta:
          $ref: "#/components/schemas/DocumentMeta"
        document_version_id:
          type: string
          format: uuid
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ReaderSection"
        spans:
          type: array
          items:
            $ref: "#/components/schemas/ReaderSpanRecord"
        facts:
          type: array
          items:
            $ref: "#/components/schemas/ReaderFactRecord"
    ReaderSibling:
      type: object
      description: >-
        A same-entity document visible at the cutoff (excluding the target)
        with fact-level evidence for duplicate/amendment comparison. Carries
        no sections/content by design (ADR-0005 section 5); spans include at
        least every span referenced by the sibling's facts.
      required: [meta, document_version_id, spans, facts]
      properties:
        meta:
          $ref: "#/components/schemas/DocumentMeta"
        document_version_id:
          type: string
          format: uuid
        spans:
          type: array
          items:
            $ref: "#/components/schemas/ReaderSpanRecord"
        facts:
          type: array
          items:
            $ref: "#/components/schemas/ReaderFactRecord"
    ReaderResponse:
      type: object
      description: >-
        Composite version-pinned reader evidence (ADR-0005). Canonical JSON
        Schema: https://contracts.fel.dev/schemas/reader-response/v1.
      required: [as_of, corpus_version_id, selection_policy, document, siblings]
      properties:
        as_of:
          type: string
          format: date-time
          description: Effective inclusive cutoff actually enforced, UTC.
        corpus_version_id:
          type: ["string", "null"]
          format: uuid
          description: The corpus pin used, or null when unpinned.
        selection_policy:
          $ref: "#/components/schemas/ReaderSelectionPolicy"
        document:
          $ref: "#/components/schemas/ReaderDocument"
        siblings:
          type: array
          items:
            $ref: "#/components/schemas/ReaderSibling"
    CreateQuery:
      type: object
      additionalProperties: false
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000
        parent_query_id:
          type: string
          format: uuid
          description: >-
            Required when controls create a comparable child query; omitted
            for a root query.
        as_of:
          type: string
          format: date-time
          description: May narrow but never widen workspace cutoff.
        corpus_version_id:
          type: string
          format: uuid
        index_version_id:
          type: string
          format: uuid
          description: >-
            Optional pin to a ready/superseded published index. Omit to
            capture the workspace active default at query creation. Never
            widen or mix versions mid-run.
        lanes:
          type: array
          uniqueItems: true
          maxItems: 4
          items:
            type: string
            enum: [dense, lexical, facts, tables]
        top_k:
          type: integer
          minimum: 1
          maximum: 100
          description: >-
            Optional. When omitted, the server applies a default of 100.
        forms:
          type: array
          maxItems: 20
          items:
            type: string
        periods:
          type: array
          maxItems: 20
          items:
            type: string
    QueryAccepted:
      type: object
      required: [query_id, run_id, events_url]
      properties:
        query_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        events_url:
          type: string
    QueryPlan:
      type: object
      additionalProperties: false
      description: >-
        Immutable plan captured at query creation. Canonical JSON Schema:
        https://contracts.fel.dev/schemas/query-plan/v1. corpus_version_id and
        index_version_id are always required resolved pins.
      required:
        [
          schema_version,
          intent,
          entity_ids,
          effective_as_of,
          corpus_version_id,
          index_version_id,
          lanes,
          variants,
          filters,
          budgets,
        ]
      properties:
        schema_version:
          const: query-plan/v1
        intent:
          type: string
          enum:
            [
              fact_lookup,
              section_lookup,
              comparison,
              table_reasoning,
              guidance,
              driver_analysis,
              contradiction,
              general,
            ]
          x-fel-open-enum: true
        entity_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        effective_as_of:
          type: string
          format: date-time
        corpus_version_id:
          type: string
          format: uuid
          description: Resolved corpus pin captured from the selected index at plan time.
        index_version_id:
          type: string
          format: uuid
          description: >-
            Resolved index pin captured at plan time; matches
            RetrievalTrace.lineage.
        lanes:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [dense, lexical, facts, tables]
            x-fel-open-enum: true
        variants:
          type: array
          minItems: 1
          maxItems: 4
          items:
            type: string
        filters:
          type: object
          additionalProperties: false
          properties:
            forms:
              type: array
              items:
                type: string
            periods:
              type: array
              items:
                type: string
        budgets:
          type: object
          additionalProperties: false
          required: [lane_top_k, fused_top_k, context_items, timeout_ms]
          properties:
            lane_top_k:
              type: integer
              minimum: 1
              maximum: 100
            fused_top_k:
              type: integer
              minimum: 1
              maximum: 100
            context_items:
              type: integer
              minimum: 1
              maximum: 16
            timeout_ms:
              type: integer
              minimum: 1
              maximum: 60000
    CandidateContribution:
      type: object
      additionalProperties: false
      required: [lane, variant_index, lane_rank, raw_score, rrf_contribution, timing_ms]
      properties:
        lane:
          type: string
          enum: [dense, lexical, facts, tables]
          x-fel-open-enum: true
        variant_index:
          type: integer
          minimum: 0
          maximum: 3
        lane_rank:
          type: integer
          minimum: 1
        raw_score:
          type: string
          pattern: "^-?[0-9]+(\\.[0-9]+)?$"
        normalized_score:
          type: ["string", "null"]
          pattern: "^-?[0-9]+(\\.[0-9]+)?$"
        rrf_contribution:
          type: string
          pattern: "^-?[0-9]+(\\.[0-9]+)?$"
        timing_ms:
          type: integer
          minimum: 0
    Candidate:
      type: object
      additionalProperties: false
      required:
        [
          item_id,
          kind,
          contributions,
          fused_score,
          accepted,
          source_span_id,
          document_version_id,
          published_at,
        ]
      properties:
        item_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [passage, table_row, fact]
        contributions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CandidateContribution"
        fused_score:
          type: string
          pattern: "^-?[0-9]+(\\.[0-9]+)?$"
        fused_rank:
          type: ["integer", "null"]
        rerank_score:
          type: ["string", "null"]
          pattern: "^-?[0-9]+(\\.[0-9]+)?$"
        rerank_rank:
          type: ["integer", "null"]
        accepted:
          type: boolean
        rejection_code:
          type: ["string", "null"]
        decision_detail:
          type: object
          additionalProperties: true
        source_span_id:
          type: string
          format: uuid
        document_version_id:
          type: string
          format: uuid
        published_at:
          type: string
          format: date-time
    RetrievalDecision:
      type: object
      additionalProperties: false
      required: [stage, code, item_ids, occurred_at]
      properties:
        stage:
          type: string
          enum: [filter, dedupe, fusion, rerank, context, verification, abstention]
          x-fel-open-enum: true
        code:
          type: string
        item_ids:
          type: array
          items:
            type: string
            format: uuid
        detail:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
    RetrievalClaim:
      type: object
      description: >-
        Claim produced by a retrieval run (Observatory). Distinct from the
        frozen claim/v1 JSON Schema used for non-trace surfaces.
      required: [id, text, status, citations]
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        status:
          type: string
          enum:
            [
              supported,
              partially_supported,
              contradicted,
              derived,
              unsupported,
            ]
        citations:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalCitation"
    RetrievalCitation:
      type: object
      description: >-
        Citation on a retrieval claim. Uses status (not entailment) per
        ADR-0006 trace contract; distinct from citation/v1.
      required: [item_id, source_span_id, status, numeric_checks]
      properties:
        item_id:
          type: string
          format: uuid
        source_span_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [entailed, partial, contradictory, irrelevant]
        numeric_checks:
          type: object
          additionalProperties:
            type: boolean
    RetrievalEvent:
      type: object
      additionalProperties: false
      description: >-
        Persisted run event (SSE data payload). Canonical JSON Schema:
        https://contracts.fel.dev/schemas/retrieval-event/v1.
      required: [schema_version, run_id, seq, type, occurred_at, payload]
      properties:
        schema_version:
          const: retrieval-event/v1
        run_id:
          type: string
          format: uuid
        seq:
          type: integer
          minimum: 1
        type:
          type: string
          enum:
            [
              run_started,
              plan_ready,
              lane_started,
              candidate_batch,
              lane_completed,
              fusion_completed,
              rerank_completed,
              context_selected,
              claim_generated,
              citation_verified,
              run_abstained,
              run_completed,
              run_failed,
              run_cancelled,
              heartbeat,
            ]
          x-fel-open-enum: true
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    RetrievalTrace:
      type: object
      additionalProperties: false
      description: >-
        Immutable Observatory trace. Canonical JSON Schema:
        https://contracts.fel.dev/schemas/retrieval-trace/v1.
      required:
        [
          run_id,
          query_id,
          plan,
          status,
          lineage,
          events,
          candidates,
          decisions,
          claims,
          timings_ms,
          budget_usage,
          cost_usd,
          started_at,
        ]
      properties:
        run_id:
          type: string
          format: uuid
        query_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            [
              queued,
              planning,
              retrieving,
              fusing,
              generating,
              verifying,
              succeeded,
              abstained,
              failed,
              cancelled,
            ]
        plan:
          $ref: "#/components/schemas/QueryPlan"
        parent_run_id:
          type: ["string", "null"]
          format: uuid
        lineage:
          type: object
          additionalProperties: false
          required:
            [
              corpus_version_id,
              index_version_id,
              planner_version,
              config_hash,
              embedding_provider,
              embedding_model,
            ]
          properties:
            corpus_version_id:
              type: string
              format: uuid
            index_version_id:
              type: string
              format: uuid
            planner_version:
              type: string
            config_hash:
              type: string
              pattern: "^sha256:[0-9a-f]{64}$"
            embedding_provider:
              type: string
            embedding_model:
              type: string
            generation_provider:
              type: ["string", "null"]
            generation_model:
              type: ["string", "null"]
        events:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalEvent"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalDecision"
        claims:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalClaim"
        timings_ms:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        budget_usage:
          type: object
          required: [context_items, context_tokens, input_tokens, output_tokens]
          properties:
            context_items:
              type: integer
              minimum: 0
            context_tokens:
              type: integer
              minimum: 0
            input_tokens:
              type: integer
              minimum: 0
            output_tokens:
              type: integer
              minimum: 0
        cost_usd:
          type: string
          pattern: "^\\d+(\\.\\d{1,6})?$"
        started_at:
          type: string
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time
    RunSummary:
      type: object
      required: [run_id, status, mode, created_at]
      properties:
        run_id:
          type: string
          format: uuid
        parent_run_id:
          type: ["string", "null"]
          format: uuid
        status:
          type: string
          enum:
            [
              queued,
              planning,
              retrieving,
              fusing,
              generating,
              verifying,
              succeeded,
              abstained,
              failed,
              cancelled,
            ]
        mode:
          type: string
          enum: [execute, rerun]
        created_at:
          type: string
          format: date-time
    QuerySnapshot:
      type: object
      required: [query_id, question, plan, runs, created_at]
      properties:
        query_id:
          type: string
          format: uuid
        parent_query_id:
          type: ["string", "null"]
          format: uuid
        question:
          type: string
        plan:
          $ref: "#/components/schemas/QueryPlan"
        runs:
          type: array
          items:
            $ref: "#/components/schemas/RunSummary"
        created_at:
          type: string
          format: date-time
    EvidenceFeedback:
      type: object
      additionalProperties: false
      required: [item_id, label]
      properties:
        item_id:
          type: string
          format: uuid
        label:
          type: string
          enum: [relevant, irrelevant, duplicate, temporally_invalid]
        reason:
          type: string
          maxLength: 2000
        supersedes_feedback_id:
          type: string
          format: uuid
          description: Earlier append-only feedback record corrected by this record.

    RunStatus:
      type: string
      enum: [queued, running, waiting_review, succeeded, failed, cancelled]
      x-fel-open-enum: false
    ProposalState:
      type: string
      enum: [proposed, needs_review, accepted, rejected, superseded]
      x-fel-open-enum: false
    ExtractionRunCreate:
      type: object
      additionalProperties: false
      required: [entity_id, as_of, modes, source_span_ids]
      properties:
        entity_id:
          type: string
          format: uuid
        as_of:
          type: string
          format: date-time
          description: >-
            Run cutoff. Effective cutoff is min(workspace.as_of, requested as_of);
            request cannot widen workspace scope.
        modes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [kpi, guidance, revenue_driver]
        source_span_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid
        claim_ids:
          type: array
          uniqueItems: true
          items:
            type: string
            format: uuid
        corpus_version_id:
          type: ["string", "null"]
          format: uuid
        limits:
          $ref: "#/components/schemas/RunLimits"
    RunLimits:
      type: object
      additionalProperties: false
      properties:
        max_calls:
          type: integer
          minimum: 1
          maximum: 10
        max_input_tokens:
          type: integer
          minimum: 1
          maximum: 100000
        max_output_tokens:
          type: integer
          minimum: 1
          maximum: 20000
        max_cost_usd:
          type: string
          pattern: "^(0(\\.\\d{1,6})?|1(\\.\\d{1,6})?|2(\\.0{1,6})?)$"
          description: >-
            Decimal USD. Request may only lower relative to active policy.
            Absolute M3 v0.4.0 schema ceiling equals ADR-0007 default 2.00.
        max_wall_seconds:
          type: integer
          minimum: 1
          maximum: 600
    ExtractionRun:
      type: object
      additionalProperties: false
      required:
        [
          id,
          workspace_id,
          entity_id,
          status,
          modes,
          as_of,
          ontology_version,
          workflow_version,
          provider,
          model,
          limits,
          usage,
          version,
          created_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
        parent_run_id:
          type: ["string", "null"]
          format: uuid
        status:
          $ref: "#/components/schemas/RunStatus"
        modes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [kpi, guidance, revenue_driver]
        as_of:
          type: string
          format: date-time
        corpus_version_id:
          type: string
          format: uuid
        ontology_version:
          type: string
        workflow_version:
          type: string
        provider:
          type: string
        model:
          type: string
        limits:
          $ref: "#/components/schemas/RunLimits"
        usage:
          type: object
          additionalProperties: false
          required: [calls, input_tokens, output_tokens, cost_usd]
          properties:
            calls:
              type: integer
            input_tokens:
              type: integer
            output_tokens:
              type: integer
            cost_usd:
              type: string
        version:
          type: integer
          minimum: 1
        error:
          anyOf:
            - $ref: "#/components/schemas/Error"
            - type: "null"
        created_at:
          type: string
          format: date-time
    ExtractionEvent:
      type: object
      additionalProperties: false
      description: >-
        Persisted extraction run event; SSE `data:` payload. Schema:
        https://contracts.fel.dev/schemas/extraction-event/v1.
      required: [schema_version, id, run_id, type, occurred_at, payload]
      properties:
        schema_version:
          const: extraction-event/v1
        id:
          type: integer
          minimum: 1
        run_id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            [
              run_queued,
              run_started,
              step_started,
              step_completed,
              step_failed,
              budget_updated,
              proposals_persisted,
              review_waiting,
              review_completed,
              run_succeeded,
              run_failed,
              run_cancelled,
              heartbeat,
            ]
          x-fel-open-enum: false
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
          description: >-
            IDs, counts, states and redacted errors only; no source or prompt text.
    ExtractionPayload:
      # Single source of truth: the frozen extraction-payload/v1 JSON Schema.
      # direction is required on revenue_driver as the design schema specifies.
      $ref: "../schemas/extraction-payload.schema.json"
    ExtractionProposal:
      type: object
      additionalProperties: false
      required:
        [
          id,
          run_id,
          kind,
          metric_id,
          payload,
          evidence,
          record_confidence,
          field_confidences,
          validations,
          state,
          review_priority,
          version,
        ]
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [kpi, guidance, revenue_driver]
        metric_id:
          type: string
        payload:
          $ref: "#/components/schemas/ExtractionPayload"
        evidence:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/EvidenceEdge"
        record_confidence:
          type: string
          pattern: "^(0(\\.\\d{1,3})?|1(\\.0{1,3})?)$"
        field_confidences:
          type: object
          additionalProperties:
            type: string
        validations:
          type: array
          items:
            type: object
            required: [code, status]
            properties:
              code:
                type: string
              status:
                type: string
                enum: [pass, warning, fail]
              detail:
                type: object
                additionalProperties: true
        state:
          $ref: "#/components/schemas/ProposalState"
        review_priority:
          type: string
          enum: [normal, high]
        version:
          type: integer
          minimum: 1
    EvidenceEdge:
      type: object
      additionalProperties: false
      required: [source_span_id, document_version_id, role, citation_status]
      properties:
        source_span_id:
          type: string
          format: uuid
        document_version_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [supports, definition, conflicts, derivation_input]
        citation_status:
          type: string
          enum: [verified, partial, contradictory, invalid]
    ReviewCommand:
      type: object
      additionalProperties: false
      required: [action, extraction_ids, expected_versions, reason]
      properties:
        action:
          type: string
          enum: [accept, edit, reject, merge]
        extraction_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid
        expected_versions:
          type: object
          minProperties: 1
          propertyNames:
            format: uuid
          additionalProperties:
            type: integer
            minimum: 1
          description: >-
            Must contain exactly one key for every extraction_id; any mismatch
            fails the entire transaction with 412.
        reason:
          type: string
          minLength: 1
          maxLength: 2000
        patch:
          type: ["object", "null"]
          additionalProperties: true
        conflict_resolution:
          type: ["object", "null"]
          additionalProperties: true
    ReviewResult:
      type: object
      required: [review_id, action, proposal_states, approved_record_ids]
      properties:
        review_id:
          type: string
          format: uuid
        action:
          type: string
        proposal_states:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ProposalState"
        approved_record_ids:
          type: array
          items:
            type: string
            format: uuid
    CorrectionCommand:
      type: object
      additionalProperties: false
      required: [reason, payload, evidence]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000
        payload:
          $ref: "#/components/schemas/ExtractionPayload"
        evidence:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/EvidenceEdge"
    ApprovedExtraction:
      type: object
      additionalProperties: false
      required:
        [
          record_id,
          version_id,
          version,
          kind,
          metric_id,
          payload,
          evidence,
          evidence_manifest_hash,
          ontology_version,
          approved_by,
          created_at,
        ]
      properties:
        record_id:
          type: string
          format: uuid
        version_id:
          type: string
          format: uuid
        parent_version_id:
          type: ["string", "null"]
          format: uuid
        version:
          type: integer
          minimum: 1
        kind:
          type: string
          enum: [kpi, guidance, revenue_driver]
        metric_id:
          type: string
        payload:
          $ref: "#/components/schemas/ExtractionPayload"
        evidence:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/EvidenceEdge"
        evidence_manifest_hash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        ontology_version:
          type: string
        approved_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
