packages:
  - "apps/*"
  - "packages/*"

# Security overrides so `node scripts/audit-bulk.mjs` in CI stays green.
# - next>postcss (M1-EVIDENCE-UI): next@16.2.10 pins postcss 8.4.31 (GHSA-qx2v-qp2m-jg93);
#   scoped to next so other consumers (e.g. vite) keep their declared resolution.
# - js-yaml (GHSA-52cp-r559-cp3m / CVE-2026-59869): @redocly/openapi-core@1.34.17
#   (via openapi-typescript in @fel/contracts) pins js-yaml@4.2.0; force >=4.3.0.
overrides:
  "next>postcss": "^8.5.10"
  "js-yaml": "^4.3.0"
