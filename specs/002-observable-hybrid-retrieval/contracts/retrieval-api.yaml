openapi: 3.1.0
info: {title: FEL Observable Retrieval Addendum, version: 0.3.0}
paths:
  /v1/workspaces/{workspaceId}/queries:
    post:
      summary: Create an immutable query and retrieval run
      security: [{bearerAuth: []}]
      parameters:
        - {in: path, name: workspaceId, required: true, schema: {type: string, format: uuid}}
        - {in: header, name: Idempotency-Key, required: true, schema: {type: string, minLength: 1, maxLength: 255}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateQuery'}
      responses:
        '202': {description: Accepted, content: {application/json: {schema: {$ref: '#/components/schemas/QueryAccepted'}}}}
        '401': {$ref: '#/components/responses/Error'}
        '403': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /v1/queries/{queryId}:
    get:
      security: [{bearerAuth: []}]
      parameters: [{in: path, name: queryId, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Query snapshot, content: {application/json: {schema: {$ref: '#/components/schemas/QuerySnapshot'}}}}
        '404': {$ref: '#/components/responses/Error'}
  /v1/retrieval-runs/{runId}/events:
    get:
      summary: Stream one run's persisted events; Last-Event-ID resumes from the next sequence
      security: [{bearerAuth: []}]
      parameters:
        - {in: path, name: runId, required: true, schema: {type: string, format: uuid}}
        - {in: header, name: Last-Event-ID, required: false, schema: {type: integer, minimum: 0}}
      responses:
        '200': {description: text/event-stream; every data payload is RetrievalEvent}
  /v1/queries/{queryId}/reruns:
    post:
      summary: Create a child run pinned to the original query inputs
      security: [{bearerAuth: []}]
      parameters:
        - {in: path, name: queryId, required: true, schema: {type: string, format: uuid}}
        - {in: header, name: Idempotency-Key, required: true, schema: {type: string}}
      responses:
        '202': {description: Accepted, content: {application/json: {schema: {$ref: '#/components/schemas/QueryAccepted'}}}}
  /v1/retrieval-runs/{runId}:
    get:
      summary: Read the immutable trace snapshot
      security: [{bearerAuth: []}]
      parameters: [{in: path, name: runId, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Trace, content: {application/json: {schema: {$ref: '#/components/schemas/RetrievalTrace'}}}}
  /v1/retrieval-runs/{runId}/feedback:
    post:
      security: [{bearerAuth: []}]
      parameters:
        - {in: path, name: runId, required: true, schema: {type: string, format: uuid}}
        - {in: header, name: Idempotency-Key, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/EvidenceFeedback'}}}
      responses: {'201': {description: Recorded}}
components:
  securitySchemes: {bearerAuth: {type: http, scheme: bearer}}
  responses:
    Error: {description: Typed canonical error envelope}
  schemas:
    CreateQuery:
      type: object
      additionalProperties: false
      required: [question]
      properties:
        question: {type: string, minLength: 1, maxLength: 4000}
        parent_query_id: {type: string, format: uuid, description: Required when controls create a comparable child query; omitted for a root query}
        as_of: {type: string, format: date-time, description: May narrow but never widen workspace cutoff}
        corpus_version_id: {type: string, format: uuid}
        lanes: {type: array, uniqueItems: true, maxItems: 4, items: {enum: [dense, lexical, facts, tables]}}
        top_k: {type: integer, minimum: 1, maximum: 100, default: 100}
        forms: {type: array, maxItems: 20, items: {type: string}}
        periods: {type: array, maxItems: 20, items: {type: string}}
    QueryAccepted:
      type: object
      required: [query_id, run_id, events_url]
      properties:
        query_id: {type: string, format: uuid}
        run_id: {type: string, format: uuid}
        events_url: {type: string}
    QueryPlan:
      type: object
      additionalProperties: false
      required: [schema_version, intent, entity_ids, effective_as_of, lanes, variants, filters, budgets]
      properties:
        schema_version: {const: query-plan/v1}
        intent: {enum: [fact_lookup, section_lookup, comparison, table_reasoning, guidance, driver_analysis, contradiction, general]}
        entity_ids: {type: array, minItems: 1, items: {type: string, format: uuid}}
        effective_as_of: {type: string, format: date-time}
        corpus_version_id: {type: [string, 'null'], format: uuid}
        index_version_id: {type: string, format: uuid}
        lanes: {type: array, uniqueItems: true, items: {enum: [dense, lexical, facts, tables]}}
        variants: {type: array, minItems: 1, maxItems: 4, items: {type: string}}
        filters: {type: object, additionalProperties: false, properties: {forms: {type: array, items: {type: string}}, periods: {type: array, items: {type: string}}}}
        budgets: {type: object, required: [lane_top_k, fused_top_k, context_items, timeout_ms], properties: {lane_top_k: {type: integer, maximum: 100}, fused_top_k: {type: integer, maximum: 100}, context_items: {type: integer, maximum: 16}, timeout_ms: {type: integer, maximum: 60000}}}
    CandidateContribution:
      type: object
      additionalProperties: false
      required: [lane, variant_index, lane_rank, raw_score, rrf_contribution, timing_ms]
      properties:
        lane: {enum: [dense, lexical, facts, tables]}
        variant_index: {type: integer, minimum: 0, maximum: 3}
        lane_rank: {type: integer, minimum: 1}
        raw_score: {type: string}
        normalized_score: {type: [string, 'null']}
        rrf_contribution: {type: string}
        timing_ms: {type: integer, minimum: 0}
    Candidate:
      type: object
      additionalProperties: false
      required: [item_id, kind, contributions, fused_score, accepted, source_span_id, document_version_id, published_at]
      properties:
        item_id: {type: string, format: uuid}
        kind: {enum: [passage, table_row, fact]}
        contributions: {type: array, minItems: 1, items: {$ref: '#/components/schemas/CandidateContribution'}}
        fused_score: {type: string}
        fused_rank: {type: [integer, 'null']}
        rerank_score: {type: [string, 'null']}
        rerank_rank: {type: [integer, 'null']}
        accepted: {type: boolean}
        rejection_code: {type: [string, 'null']}
        decision_detail: {type: object}
        source_span_id: {type: string, format: uuid}
        document_version_id: {type: string, format: uuid}
        published_at: {type: string, format: date-time}
    RetrievalDecision:
      type: object
      additionalProperties: false
      required: [stage, code, item_ids, occurred_at]
      properties:
        stage: {enum: [filter, dedupe, fusion, rerank, context, verification, abstention]}
        code: {type: string}
        item_ids: {type: array, items: {type: string, format: uuid}}
        detail: {type: object}
        occurred_at: {type: string, format: date-time}
    Claim:
      type: object
      required: [id, text, status, citations]
      properties:
        id: {type: string, format: uuid}
        text: {type: string}
        status: {enum: [supported, partially_supported, contradicted, derived, unsupported]}
        citations: {type: array, items: {$ref: '#/components/schemas/Citation'}}
    Citation:
      type: object
      required: [item_id, source_span_id, status, numeric_checks]
      properties:
        item_id: {type: string, format: uuid}
        source_span_id: {type: string, format: uuid}
        status: {enum: [entailed, partial, contradictory, irrelevant]}
        numeric_checks: {type: object, additionalProperties: {type: boolean}}
    RetrievalEvent:
      type: object
      required: [schema_version, run_id, seq, type, occurred_at, payload]
      properties:
        schema_version: {const: retrieval-event/v1}
        run_id: {type: string, format: uuid}
        seq: {type: integer, minimum: 1}
        type: {enum: [run_started, plan_ready, lane_started, candidate_batch, lane_completed, fusion_completed, rerank_completed, context_selected, claim_generated, citation_verified, run_abstained, run_completed, run_failed, heartbeat]}
        occurred_at: {type: string, format: date-time}
        payload: {type: object}
    RetrievalTrace:
      type: object
      required: [run_id, query_id, plan, status, lineage, events, candidates, decisions, claims, timings_ms, budget_usage, cost_usd, started_at]
      properties:
        run_id: {type: string, format: uuid}
        query_id: {type: string, format: uuid}
        status: {enum: [queued, planning, retrieving, fusing, generating, verifying, succeeded, abstained, failed, cancelled]}
        plan: {$ref: '#/components/schemas/QueryPlan'}
        parent_run_id: {type: [string, 'null'], format: uuid}
        lineage:
          type: object
          additionalProperties: false
          required: [corpus_version_id, index_version_id, planner_version, config_hash, embedding_provider, embedding_model]
          properties:
            corpus_version_id: {type: string, format: uuid}
            index_version_id: {type: string, format: uuid}
            planner_version: {type: string}
            config_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
            embedding_provider: {type: string}
            embedding_model: {type: string}
            generation_provider: {type: [string, 'null']}
            generation_model: {type: [string, 'null']}
        events: {type: array, items: {$ref: '#/components/schemas/RetrievalEvent'}}
        candidates: {type: array, items: {$ref: '#/components/schemas/Candidate'}}
        decisions: {type: array, items: {$ref: '#/components/schemas/RetrievalDecision'}}
        claims: {type: array, items: {$ref: '#/components/schemas/Claim'}}
        timings_ms: {type: object, additionalProperties: {type: integer, minimum: 0}}
        budget_usage:
          type: object
          required: [context_items, context_tokens, input_tokens, output_tokens]
          properties:
            context_items: {type: integer, minimum: 0}
            context_tokens: {type: integer, minimum: 0}
            input_tokens: {type: integer, minimum: 0}
            output_tokens: {type: integer, minimum: 0}
        cost_usd: {type: string, pattern: '^\d+(\.\d{1,6})?$'}
        started_at: {type: string, format: date-time}
        finished_at: {type: [string, 'null'], format: date-time}
    RunSummary:
      type: object
      required: [run_id, status, mode, created_at]
      properties:
        run_id: {type: string, format: uuid}
        parent_run_id: {type: [string, 'null'], format: uuid}
        status: {enum: [queued, planning, retrieving, fusing, generating, verifying, succeeded, abstained, failed, cancelled]}
        mode: {enum: [execute, rerun]}
        created_at: {type: string, format: date-time}
    QuerySnapshot:
      type: object
      required: [query_id, question, plan, runs, created_at]
      properties:
        query_id: {type: string, format: uuid}
        parent_query_id: {type: [string, 'null'], format: uuid}
        question: {type: string}
        plan: {$ref: '#/components/schemas/QueryPlan'}
        runs: {type: array, items: {$ref: '#/components/schemas/RunSummary'}}
        created_at: {type: string, format: date-time}
    EvidenceFeedback:
      type: object
      additionalProperties: false
      required: [item_id, label]
      properties:
        item_id: {type: string, format: uuid}
        label: {enum: [relevant, irrelevant, duplicate, temporally_invalid]}
        reason: {type: string, maxLength: 2000}
